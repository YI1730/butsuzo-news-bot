name: Update Buddhist News Dashboard

on:
  schedule:
    # JST 6:30 / 10:30 / 15:30 / 17:30 / 20:30 / 23:30
    - cron: "30 21,1,6,8,11,14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update_dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch news (Google RSS)
        run: python post_news.py

      - name: Fetch special sites
        run: python scrape_special.py

      - name: Fetch exhibition info
        run: python scrape_exhibition.py

      - name: Generate dashboard HTML
        run: python generate_dashboard.py

      - name: Commit and push docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if ! git diff --staged --quiet; then
            git commit -m "chore: update news dashboard"
            git push
          else
            echo "No changes to commit"
          fi
