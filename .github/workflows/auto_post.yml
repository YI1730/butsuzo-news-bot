name: Auto Post Buddhist News

on:
  schedule:
    # 毎日 09:00 / 12:00 / 18:00 JST (UTC で 00:00 / 03:00 / 09:00)
    - cron: "0 0,3,9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run post_news.py
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python post_news.py

      - name: Commit posted_urls.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet posted_urls.txt; then
            git add posted_urls.txt
            git commit -m "chore: update posted_urls.txt"
            git push
          else
            echo "No changes to posted_urls.txt"
          fi
